name: deploy-aws-ec2

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**
      - docker-compose.ec2.yml
      - .github/workflows/deploy-aws-ec2.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-2' }}
  BACKEND_REPOSITORY: nila-backend
  FRONTEND_REPOSITORY: nila-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.meta.outputs.ecr_registry }}
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compute image tags and registry
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          ecr_registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          image_tag="sha-${GITHUB_SHA::12}"
          echo "ecr_registry=${ecr_registry}" >> "${GITHUB_OUTPUT}"
          echo "backend_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "frontend_tag=${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "${BACKEND_REPOSITORY}" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "${BACKEND_REPOSITORY}" \
              --image-scanning-configuration scanOnPush=true >/dev/null
          aws ecr describe-repositories --repository-names "${FRONTEND_REPOSITORY}" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "${FRONTEND_REPOSITORY}" \
              --image-scanning-configuration scanOnPush=true >/dev/null

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.meta.outputs.ecr_registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.backend_tag }}
        run: |
          set -euo pipefail
          docker build -t "${ECR_REGISTRY}/${BACKEND_REPOSITORY}:${IMAGE_TAG}" ./backend
          docker tag "${ECR_REGISTRY}/${BACKEND_REPOSITORY}:${IMAGE_TAG}" "${ECR_REGISTRY}/${BACKEND_REPOSITORY}:latest"
          docker push "${ECR_REGISTRY}/${BACKEND_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${BACKEND_REPOSITORY}:latest"

      - name: Build and push frontend image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.meta.outputs.ecr_registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.frontend_tag }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_FACEBOOK_APP_ID: ${{ vars.VITE_FACEBOOK_APP_ID }}
        run: |
          set -euo pipefail
          docker build \
            -f ./frontend/Dockerfile.prod \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            --build-arg VITE_GOOGLE_CLIENT_ID="${VITE_GOOGLE_CLIENT_ID}" \
            --build-arg VITE_FACEBOOK_APP_ID="${VITE_FACEBOOK_APP_ID}" \
            -t "${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:${IMAGE_TAG}" \
            ./frontend
          docker tag "${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:${IMAGE_TAG}" "${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:latest"
          docker push "${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${FRONTEND_REPOSITORY}:latest"

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR != '' && vars.EC2_APP_DIR || '/opt/nila' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deploy directory exists on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ env.EC2_APP_DIR }}"

      - name: Sync compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.ec2.yml
          target: ${{ env.EC2_APP_DIR }}/

      - name: Pull images and restart stack
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          APP_DIR: ${{ env.EC2_APP_DIR }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
          BACKEND_TAG: ${{ needs.build-and-push.outputs.backend_tag }}
          FRONTEND_TAG: ${{ needs.build-and-push.outputs.frontend_tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,APP_DIR,ECR_REGISTRY,BACKEND_TAG,FRONTEND_TAG
          script: |
            set -euo pipefail
            cd "${APP_DIR}"

            if [ ! -f ".env.ec2" ]; then
              echo "ERROR: falta .env.ec2 en ${APP_DIR}" >&2
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: docker no esta instalado en EC2" >&2
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: docker compose plugin no esta disponible en EC2" >&2
              exit 1
            fi
            if ! command -v aws >/dev/null 2>&1; then
              echo "ERROR: aws cli no esta instalado en EC2" >&2
              exit 1
            fi

            upsert_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env.ec2; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env.ec2
              else
                echo "${key}=${value}" >> .env.ec2
              fi
            }

            upsert_env ECR_REGISTRY "${ECR_REGISTRY}"
            upsert_env BACKEND_TAG "${BACKEND_TAG}"
            upsert_env FRONTEND_TAG "${FRONTEND_TAG}"

            aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            docker compose -f docker-compose.ec2.yml --env-file .env.ec2 pull
            docker compose -f docker-compose.ec2.yml --env-file .env.ec2 up -d --remove-orphans
            docker compose -f docker-compose.ec2.yml --env-file .env.ec2 ps
